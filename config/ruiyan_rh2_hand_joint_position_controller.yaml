# Joint Group Position Controller Configuration for Ruiyan RH2 Hand
# This controller provides direct position commands to all hand joints

ruiyan_rh2_hand_joint_position_controller:
  ros__parameters:
    # Joint specification
    joints:
      - thumb_proximal_yaw_joint     # Thumb yaw
      - thumb_proximal_pitch_joint   # Thumb pitch
      - index_proximal_joint         # Index finger
      - middle_proximal_joint        # Middle finger
      - ring_proximal_joint          # Ring finger
      - pinky_proximal_joint         # Pinky finger

    # Interface configuration
    interface_name: position

    # Command timeout (safety feature)
    # If no command is received within this time, the controller will stop
    # Set to 0.0 to disable timeout
    command_timeout: 0.5  # seconds
